syntax = "proto3";

package module;

option go_package = "github.com/wolfymaster/woofx3/db/gen/v1";

import "common.proto";

message ModuleAction {
  string id = 1;
  string module_id = 2;
  string module_name = 3;
  string name = 4;
  string description = 5;
  string call = 6;
  string params_schema = 7;
}

message RegisterActionRequest {
  string module_name = 1;
  string name = 2;
  string description = 3;
  string call = 4;
  string params_schema = 5;
}

message ListActionsRequest {
  string module_name = 1;
}

message ListActionsResponse {
  common.ResponseStatus status = 1;
  repeated ModuleAction actions = 2;
}

message ModuleActionResponse {
  common.ResponseStatus status = 1;
  ModuleAction action = 2;
}

message DeleteActionsByModuleRequest {
  string module_name = 1;
}
