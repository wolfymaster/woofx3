syntax = "proto3";

package module;

option go_package = "github.com/wolfymaster/woofx3/db/gen/v1";

import "common.proto";

message Trigger {
  string id = 1;
  string category = 4;
  string name = 5;
  string description = 6;
  string event = 7;
  string config_schema = 8;
  bool allow_variants = 9;
  string created_by_type = 10;
  string created_by_ref = 11;
}

message TriggerInput {
  string category = 1;
  string name = 2;
  string description = 3;
  string event = 4;
  string config_schema = 5;   // JSON string
  bool allow_variants = 6;
}

message RegisterTriggersRequest {
  string module_key = 1;   // composite "{id}:{version}:{hash}" — stored as created_by_ref when created_by_type/ref are empty
  string module_name = 2;  // manifest.name — carried to event for display
  string version = 3;      // manifest.version — carried to event as metadata
  repeated TriggerInput triggers = 4;
  // Optional explicit registration identity. When both are set they override
  // the default (MODULE, module_key) pairing, letting non-module registrars
  // (e.g. SYSTEM services) upsert into the same table under their own
  // namespace. The upsert key is (created_by_type, created_by_ref, name).
  string created_by_type = 5;
  string created_by_ref = 6;
}

message ListTriggersRequest {
  string created_by_type = 1;
  string created_by_ref = 2;
}

message ListTriggersResponse {
  common.ResponseStatus status = 1;
  repeated Trigger triggers = 2;
}

