syntax = "proto3";

package module;
option go_package = "github.com/wolfymaster/woofx3/db/gen/v1";

import "common.proto";
import "google/protobuf/timestamp.proto";
import "module_trigger.proto";
import "module_action.proto";
import "module_resource.proto";

service ModuleService {
  rpc CreateModule(CreateModuleRequest) returns (ModuleResponse);
  rpc UpdateModule(UpdateModuleRequest) returns (ModuleResponse);
  rpc DeleteModule(DeleteModuleRequest) returns (common.ResponseStatus);
  rpc GetModule(GetModuleRequest) returns (ModuleResponse);
  rpc GetModuleByName(GetModuleByNameRequest) returns (ModuleResponse);
  rpc GetModuleByModuleKey(GetModuleByModuleKeyRequest) returns (ModuleResponse);
  rpc ListModules(ListModulesRequest) returns (ListModulesResponse);
  rpc SetModuleState(SetModuleStateRequest) returns (ModuleResponse);
  rpc RegisterTriggers(RegisterTriggersRequest) returns (ListTriggersResponse);
  rpc ListTriggers(ListTriggersRequest) returns (ListTriggersResponse);
  rpc DeleteTriggersByModule(DeleteTriggersByModuleRequest) returns (common.ResponseStatus);
  rpc DeleteTriggersByModuleId(DeleteByModuleIdRequest) returns (common.ResponseStatus);
  rpc RegisterActions(RegisterActionsRequest) returns (ListActionsResponse);
  rpc ListActions(ListActionsRequest) returns (ListActionsResponse);
  rpc DeleteActionsByModule(DeleteActionsByModuleRequest) returns (common.ResponseStatus);
  rpc DeleteActionsByModuleId(DeleteByModuleIdRequest) returns (common.ResponseStatus);
  rpc CreateModuleResource(CreateModuleResourceRequest) returns (ModuleResourceResponse);
  rpc ListModuleResources(ListModuleResourcesRequest) returns (ListModuleResourcesResponse);
  rpc DeleteModuleResources(DeleteModuleResourcesRequest) returns (common.ResponseStatus);
  rpc UpdateModuleResourceVersion(UpdateModuleResourceVersionRequest) returns (ModuleResourceResponse);
  rpc CompleteModuleInstall(CompleteModuleInstallRequest) returns (common.ResponseStatus);
  rpc CheckModuleResourceUsage(CheckModuleResourceUsageRequest) returns (CheckModuleResourceUsageResponse);
  rpc CompleteModuleDelete(CompleteModuleDeleteRequest) returns (common.ResponseStatus);
}

message Module {
  string id = 1;
  string name = 2;
  string version = 3;
  string manifest = 4;
  string state = 5;
  string archive_key = 6;
  repeated ModuleFunction functions = 7;
  google.protobuf.Timestamp installed_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  string created_by_type = 10;
  string created_by_ref = 11;
  string module_key = 12;
}

message ModuleFunction {
  string id = 1;
  string module_id = 2;
  string function_name = 3;
  string file_name = 4;
  string file_key = 5;
  string entry_point = 6;
  string runtime = 7;
}

message CreateModuleRequest {
  string name = 1;
  string version = 2;
  string manifest = 3;
  string archive_key = 4;
  repeated CreateModuleFunctionRequest functions = 5;
  string created_by_type = 6;
  string created_by_ref = 7;
  string module_key = 8;
}

message CreateModuleFunctionRequest {
  string function_name = 1;
  string file_name = 2;
  string file_key = 3;
  string entry_point = 4;
  string runtime = 5;
}

message UpdateModuleRequest {
  string id = 1;
  string version = 2;
  string manifest = 3;
  string archive_key = 4;
  repeated CreateModuleFunctionRequest functions = 5;
}

message DeleteModuleRequest {
  string name = 1;
}

message GetModuleRequest {
  string id = 1;
}

message GetModuleByNameRequest {
  string name = 1;
}

message GetModuleByModuleKeyRequest {
  string module_key = 1;
}

message ListModulesRequest {
  string state = 1;
}

message SetModuleStateRequest {
  string name = 1;
  string state = 2;
}

message ModuleResponse {
  common.ResponseStatus status = 1;
  Module module = 2;
}

message ListModulesResponse {
  common.ResponseStatus status = 1;
  repeated Module modules = 2;
}

message CompleteModuleInstallRequest {
  string module_id = 1;
  string module_name = 2;
  string version = 3;
  string status = 4;
  string error = 5;
  common.RequestContext request_context = 6;
}

// UsageRef identifies a single source that references a target resource.
message UsageRef {
  string source_type = 1;   // "workflow" | "command"
  string source_id = 2;
  string source_name = 3;
  string context = 4;       // e.g., "step[3]" or "trigger"
}

// ResourceUsage groups all sources that reference a single target resource.
message ResourceUsage {
  string resource_id = 1;     // module_resources.id
  string resource_type = 2;
  string resource_name = 3;
  repeated UsageRef used_by = 4;
}

message CheckModuleResourceUsageRequest {
  string module_id = 1;
  string application_id = 2;
}

message CheckModuleResourceUsageResponse {
  common.ResponseStatus status = 1;
  repeated ResourceUsage in_use = 2;
}

message CompleteModuleDeleteRequest {
  string module_id = 1;
  string module_name = 2;
  string status = 3;                              // "completed" | "failed"
  string error = 4;
  repeated ResourceUsage in_use_resources = 5;
  common.RequestContext request_context = 6;
}

message DeleteByModuleIdRequest {
  string module_id = 1;  // == manifest.id; server does `created_by_ref LIKE '{module_id}:%'`
}
